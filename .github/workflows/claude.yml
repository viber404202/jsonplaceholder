name: Claude Code

# Thin caller — the actual logic lives in the org-wide reusable workflow at
# viber404202/claude-workflows. Update that repo to change behavior everywhere.
# Only the trigger list below and the `uses:` ref need to live in each repo.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  claude:
    uses: viber404202/claude-workflows/.github/workflows/claude.yml@main
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
